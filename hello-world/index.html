<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World - Light / Dark / Party</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <h1 class="greeting">Hello World!</h1>
    <p class="subtitle">Pick your vibe</p>
    <div class="mode-buttons">
      <button id="light" class="mode-btn" data-mode="light">Light</button>
      <button id="dark" class="mode-btn" data-mode="dark">Dark</button>
      <button id="party" class="mode-btn" data-mode="party">Party</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
